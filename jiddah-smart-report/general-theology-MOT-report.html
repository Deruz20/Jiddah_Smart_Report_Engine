<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كشف الدرجات لمنتصف الفترة - Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

<style>
/* ===== PREMIUM THEME UPGRADE ===== */
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background: 
    linear-gradient(rgba(240,240,240,.96), rgba(240,240,240,.96)),
    url('https://www.transparenttextures.com/patterns/islamic-art.png'); /* Pattern added for texture */
    background-size: 400px;
    font-family:'Cairo', sans-serif;
    display:flex;
    justify-content:center;
    align-items: center;
    min-height: 100vh;
    padding:12px;
}

/* MAIN CARD */
.report{
    width:210mm;
    height:148mm;
    background: 
    linear-gradient(
        135deg, 
        #f7f2e4 0%, 
        #efe4c7 50%, 
        #f8f4ea 100%
    );
    border:3px solid #0d5c46;
    position:relative;
    overflow:hidden;
    box-shadow: 
    0 10px 30px rgba(0,0,0,.15),
    inset 0 0 0 8px rgba(255,255,255,.35);
    border-radius:6px;
}

/* GOLD DECOR */
.report::after{
    content:'';
    position:absolute;
    inset:10px;
    border:1.5px solid rgba(212,170,55,.65);
    pointer-events:none;
}

/* WATERMARK */
.report::before{
    content:'';
    position:absolute;
    inset:0;
    background: url('school-badge.png') center center no-repeat;
    background-size:250px;
    opacity:.045;
    pointer-events:none;
}

/* CONTENT */
.inner{
    padding:22px 35px 18px;
    position:relative;
    z-index:2;
}

/* HEADER */
.header{
    text-align:center;
    position:relative;
}

.basmala{
    font-family:'Amiri', serif;
    font-size:28px;
    font-weight:700;
    color:#0d5c46;
    margin-bottom:6px;
    letter-spacing:.5px;
}

.school{
    font-size:26px;
    font-weight:800;
    color:#b71c1c;
    text-shadow: 
    1px 1px 0 #ffffff,
    3px 3px 0 rgba(13,92,70,.25);
    line-height:1.3;
}

.title{
    margin-top:10px;
    font-size:22px;
    font-weight:900;
    color:#111;
    display:inline-block;
    padding:2px 22px;
    border-bottom:4px solid #0d5c46;
}

/* INFO AREA */
.info{
    margin-top:22px;
    font-size:17px;
    font-weight:700;
    color:#111;
}

.row{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:10px;
}

.line{
    flex:1;
    border-bottom:2px solid #222;
    height:14px;
}

.short{ width:100px; }
.medium{ width:150px; }

/* TABLE */
.table-wrap{
    margin-top:18px;
    display:flex;
    justify-content:center;
}

.table{
    width:95%;
    border-collapse:collapse;
    table-layout:fixed;
    font-size:17px;
    background:rgba(255,255,255,.22);
}

.table th, 
.table td{
    border:1.8px solid #0d5c46;
    text-align:center;
}

.table th{
    padding:8px 4px;
    background: 
    linear-gradient(
        180deg, 
        #f6e6b4 0%, 
        #e3c25a 100%
    );
    color:#111;
    font-weight:900;
}

.table td{
    height:48px;
    background:rgba(255,255,255,.35);
}

.red{
    color:#c1121f;
    font-weight:900;
}

/* STUDENTS ROW */
.students{
    margin-top:12px;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:10px;
    font-size:17px;
    font-weight:700;
}

.students .line{
    width:160px;
    flex:none;
}

.rank{
    color:#c1121f;
    font-weight:900;
}

/* COMMENT */
.comment{
    margin-top:14px;
    display:flex;
    align-items:center;
    gap:10px;
    font-size:17px;
    font-weight:700;
}

.comment .line{
    flex:1;
}

/* PREMIUM CORNER ORNAMENTS */
.corner{
    position:absolute;
    width:35px;
    height:35px;
    border-color:#0d5c46;
    z-index:3;
}

.top-right{ top:12px; right:12px; border-top:3px solid; border-right:3px solid; }
.top-left{ top:12px; left:12px; border-top:3px solid; border-left:3px solid; }
.bottom-right{ bottom:12px; right:12px; border-bottom:3px solid; border-right:3px solid; }
.bottom-left{ bottom:12px; left:12px; border-bottom:3px solid; border-left:3px solid; }

@media print{
    body{ background:white; padding:0; }
    .report{ box-shadow:none; border: 2px solid #0d5c46; margin:0; }
}

</style>
</head>
<body>

<div class="report">
    <div class="corner top-right"></div>
    <div class="corner top-left"></div>
    <div class="corner bottom-right"></div>
    <div class="corner bottom-left"></div>

    <div class="inner">

        <div class="header">
            <div class="basmala">بسم الله الرحمن الرحيم</div>
            <div class="school">مدرسة جدة الإسلامية للروضة والابتدائية _ نساغو واكيسو</div>
            <div class="title">كشف الدرجات لمنتصف الفترة</div>
        </div>

        <div class="info">
            <div class="row">
                <span>اسم الطالب/ة :</span>
                <div class="line"></div>
            </div>

            <div class="row">
                <span>الفترة:</span>
                <div class="line short"></div>

                <span>الفصل:</span>
                <div class="line short"></div>

                <span>السنة :</span>
                <div class="line medium"></div>
            </div>
        </div>

        <div class="table-wrap">
            <table class="table">
                <tr>
                    <th>القرآن</th>
                    <th>اللغة العربية</th>
                    <th>الفقه</th>
                    <th>التربية</th>
                    <th>المجموع</th>
                    <th class="red">الدرجة</th>
                </tr>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
            </table>
        </div>

        <div class="students">
            <span>عدد الطلبة :</span>
            <div class="line"></div>
            <span class="rank">الترتيب :</span>
            <div class="line"></div>
        </div>

        <div class="comment">
            <span>تقرير مرب الفصل :</span>
            <div class="line"></div>
        </div>

    </div>
</div>

</body>
</html>
